<!doctype html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ödev 2" />
    <meta name="author" content="Ödev 2" />

    <!-- Title -->
    <title>Google!</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:400,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:400,400italic,700,700italic"
      rel="stylesheet"
    />

    <!-- Bootstrap CSS (Local) -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />

    <!-- Font Awesome (Local CSS Version) -->
    <link rel="stylesheet" href="css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Google logosu – renkli harflerle -->
      <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span
        ><span>e</span><span>!</span>
        <span class="beta">BETA</span>
      </div>

      <!-- Arama kutusu başlığı -->
      <div class="subtitle">Search the web using Google!</div>

      <!-- Arama formu -->
      <form>
        <input type="text" name="q" />
        <br /><br />
        <input type="submit" value="Google Search" />
        <input type="submit" value="I'm Feeling Lucky" />
      </form>

      <!-- Küçük linkler -->
      <div class="small-links">
        [<a href="">Google Search</a>] [<a href="">I'm feeling lucky</a>]
      </div>
    </div>

    <!-- Footer bölümü – turkuaz arka plan + 3 sütun -->
    <div class="footer">
      <table class="footer-table">
        <tr>
          <!-- Sol sütun: Special Searches -->
          <td>
            <b>Special Searches</b><br />
            <a href="">Stanford Search</a><br />
            <a href="">Linux Search</a>
          </td>

          <!-- Orta sütun: Yardım linkleri -->
          <td>
            <a href="">Help!</a><br />
            <a href="">About Google!</a><br />
            <a href="">Company Info</a><br />
            <a href="">Google! Logos</a>
          </td>

          <!-- Sağ sütun: E-posta aboneliği -->
          <td>
            Get Google! updates monthly:<br />
            <input type="text" value="your e-mail" /><br />
            [<a href="">Subscribe</a>] [<a href="">Archive</a>]
          </td>
        </tr>
      </table>
    </div>

    <!-- En alt copyright -->
    <div class="copyright">Copyright ©1998 Google Inc.</div>

    <!-- JS local -->
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <!-- cdn -->
    <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
  </body>
</html>
